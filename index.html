<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shashi Shastri| Yoga & Wellness</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Poppins', sans-serif; }
        .active-lang { background-color: #78350f !important; color: white !important; }
    </style>
</head>
<body class="bg-stone-50 min-h-screen flex flex-col items-center p-4">

    <header class="w-full max-w-sm flex justify-between items-center py-4 mb-8">
        <div class="text-xl font-bold text-stone-800">Shashi Shastri Yoga</div>
        <div class="bg-stone-200 p-1 rounded-full flex gap-1 shadow-inner">
            <button id="btn-en" class="active-lang px-4 py-1 rounded-full text-sm font-semibold transition" onclick="setLanguage('en')">EN</button>
            <button id="btn-hi" class="px-4 py-1 rounded-full text-sm font-semibold transition" onclick="setLanguage('hi')">हिंदी</button>
        </div>
    </header>

    <main class="w-full max-w-sm text-center space-y-6">
        <div class="w-32 h-32 mx-auto bg-stone-300 rounded-full flex items-center justify-center overflow-hidden border-4 border-white shadow-lg">
            <img src="media/hero.jpg" alt="Yoga instructor hero profile" />
        </div>

        <div>
            <h1 data-i18n="name" class="text-3xl font-semibold text-stone-900">Shashi Shastri</h1>
            <p data-i18n="title" class="text-stone-600">Yoga & Mindfulness Guide</p>
        </div>

        <div class="bg-white p-6 rounded-3xl shadow-sm text-stone-700 leading-relaxed text-sm">
            <p data-i18n="bio">Certified Yoga Instructor with 10+ years of practice. Helping you find balance, breathe deeply, and reconnect with your inner self.</p>
        </div>

        <div class="grid gap-3">
            <button class="w-full py-4 bg-orange-700 text-white font-semibold rounded-2xl shadow-md active:scale-95 transition" data-i18n="btnClasses">View Classes</button>
            <div class="grid grid-cols-2 gap-3">
                <a href="#" class="flex items-center justify-center gap-2 py-4 bg-white text-stone-800 font-semibold rounded-2xl border border-stone-200 shadow-sm active:scale-95 transition">
                    <i class="fa-brands fa-instagram text-xl"></i>
                    <span>Instagram</span>
                </a>
                <a href="#" class="flex items-center justify-center gap-2 py-4 bg-white text-stone-800 font-semibold rounded-2xl border border-stone-200 shadow-sm active:scale-95 transition">
                    <i class="fa-brands fa-facebook text-xl"></i>
                    <span>Facebook</span>
                </a>
            </div>
        </div>
    </main>

    <script>
        const content = {
            en: {
                name: "Shashi Shastri",
                title: "Yoga & Mindfulness Guide",
                bio: "Certified Yoga Instructor with 10+ years of practice. Helping you find balance, breathe deeply, and reconnect with your inner self.",
                btnClasses: "View Classes"
            },
            hi: {
                name: "शशि शास्त्री " 
                title: "योग और माइंडफुलनेस गाइड",
                bio: "10 से अधिक वर्षों के अनुभव के साथ प्रमाणित योग प्रशिक्षक। संतुलन पाने, गहरी सांस लेने और खुद से जुड़ने में आपकी मदद कर रही हूँ।",
                btnClasses: "कक्षाएं देखें"
            }
        };

        function setLanguage(lang) {
            // Update Text Content
            document.querySelectorAll('[data-i18n]').forEach(element => {
                const key = element.getAttribute('data-i18n');
                element.textContent = content[lang][key];
            });

            // Update UI State
            document.getElementById('btn-en').classList.remove('active-lang');
            document.getElementById('btn-hi').classList.remove('active-lang');
            document.getElementById(`btn-${lang}`).classList.add('active-lang');
        }
    </script>
</body>
</html>
